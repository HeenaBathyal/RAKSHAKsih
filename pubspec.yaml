name: rakshak
description: A smart safety and blockchain app for tourists.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_localizations:
    sdk: flutter
  http: ^1.5.0

  url_launcher: ^6.1.7
  geolocator: ^14.0.2
  flutter_contacts: ^1.1.8
  share_plus: ^12.0.0
  permission_handler: ^12.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/nature.png
    - assets/image.jpeg
